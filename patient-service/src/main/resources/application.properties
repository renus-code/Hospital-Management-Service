server.port=8083
spring.application.name=patient-service

spring.data.mongodb.uri=mongodb://localhost:27017/hms-patient

# Same secret as auth-service and hospital-service (HS256)
jwt.secret=${JWT_SECRET:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
jwt.expiration-ms=86400000

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=${EUREKA_URI:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true
eureka.instance.hostname=Renuupendra
eureka.instance.instance-id=Renuupendra:${spring.application.name}:${server.port}

services.auth.ui-base-url=http://localhost:8081

logging.level.root=INFO
logging.level.com.hospital.patient=INFO
