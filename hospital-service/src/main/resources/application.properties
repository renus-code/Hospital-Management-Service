server.port=8082
spring.application.name=hospital-service

spring.data.mongodb.uri=mongodb://localhost:27017/hms-hospital

# Same secret as auth-service — JWTs from /api/auth/login work on hospital REST API
jwt.secret=${JWT_SECRET:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
jwt.expiration-ms=86400000

# auth-service (RestTemplate)
services.auth.base-url=http://localhost:8081
services.auth.ui-base-url=http://localhost:8081
services.auth.enabled=true
services.auth.strict=false

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=${EUREKA_URI:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true
eureka.instance.hostname=Renuupendra
eureka.instance.instance-id=Renuupendra:${spring.application.name}:${server.port}

logging.level.root=INFO
logging.level.com.hospital.hms=INFO
