<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
	<meta charset="UTF-8"/>
	<meta name="viewport" content="width=device-width, initial-scale=1"/>
	<title>Access denied — HMS</title>
	<link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
	<div th:replace="~{fragments :: navbar}"></div>
	<main>
		<div class="card">
			<h1>Access denied</h1>
			<p>You don't have permission to view that page with your current role.</p>
			<p sec:authorize="hasRole('ADMIN')" class="muted">Signed in as Admin.</p>
			<p sec:authorize="hasRole('DOCTOR')" class="muted">Signed in as Doctor.</p>
			<p sec:authorize="hasRole('PATIENT')" class="muted">Signed in as Patient.</p>
			<div style="margin-top:1rem;display:flex;gap:0.5rem;">
				<a class="btn btn-primary" th:href="@{/dashboard}">Back to dashboard</a>
				<form th:action="@{/logout}" method="post" style="display:inline;">
					<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
					<button type="submit" class="btn btn-secondary">Sign out</button>
				</form>
			</div>
		</div>
	</main>
</body>
</html>
