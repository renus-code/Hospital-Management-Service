<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8"/>
	<meta name="viewport" content="width=device-width, initial-scale=1"/>
	<title th:text="${editMode == true} ? 'Edit role' : 'New role'">Role — HMS Auth</title>
	<link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
	<div th:replace="~{fragments :: navbar}"></div>
	<main>
		<div class="card" style="max-width:560px;">
			<h1 th:text="${editMode == true} ? 'Edit role' : 'New role'">Role</h1>
			<form th:object="${roleRequest}"
				  th:action="${editMode == true} ? @{/roles/{id}(id=${roleId})} : @{/roles}"
				  method="post"
				  class="form-grid">
				<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
				<div>
					<label for="roleTitle">Title</label>
					<input id="roleTitle" type="text" th:field="*{roleTitle}" required="required"/>
					<p class="field-error" th:if="${#fields.hasErrors('roleTitle')}" th:errors="*{roleTitle}"></p>
				</div>
				<div>
					<label for="roleDescription">Description</label>
					<textarea id="roleDescription" th:field="*{roleDescription}" rows="3"></textarea>
				</div>
				<div>
					<button type="submit" class="btn btn-primary">Save</button>
					<a class="btn btn-secondary" th:href="@{/roles}">Cancel</a>
				</div>
			</form>
		</div>
	</main>
</body>
</html>
