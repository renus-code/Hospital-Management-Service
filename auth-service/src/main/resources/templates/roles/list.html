<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8"/>
	<meta name="viewport" content="width=device-width, initial-scale=1"/>
	<title>Roles — HMS Auth</title>
	<link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
	<div th:replace="~{fragments :: navbar}"></div>
	<main>
		<div class="page-header">
			<h1>Roles</h1>
			<a class="btn btn-primary" th:href="@{/roles/new}">Add role</a>
		</div>
		<div class="card">
			<table class="data-table">
				<thead>
					<tr>
						<th>Title</th>
						<th>Description</th>
						<th></th>
					</tr>
				</thead>
				<tbody>
					<tr th:each="r : ${roles}">
						<td th:text="${r.roleTitle}"></td>
						<td th:text="${r.roleDescription}"></td>
						<td class="actions">
							<a class="btn btn-secondary btn-sm" th:href="@{/roles/{id}/edit(id=${r.roleId})}">Edit</a>
							<form th:action="@{/roles/{id}/delete(id=${r.roleId})}" method="post" style="display:inline;">
								<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
								<button type="submit" class="btn btn-danger btn-sm" onclick="return confirm('Delete this role?');">Delete</button>
							</form>
						</td>
					</tr>
				</tbody>
			</table>
		</div>
	</main>
</body>
</html>
