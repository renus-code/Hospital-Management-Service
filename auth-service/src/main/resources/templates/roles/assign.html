<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8"/>
	<meta name="viewport" content="width=device-width, initial-scale=1"/>
	<title>Assign role — HMS Auth</title>
	<link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
	<div th:replace="~{fragments :: navbar}"></div>
	<main>
		<div class="card" style="max-width:520px;">
			<h1>Assign role to user</h1>
			<p class="muted">Maps to UML <code>assignRole</code>: set a user’s role.</p>
			<form th:action="@{/roles/assign-role}" th:object="${assignForm}" method="post" class="form-grid">
				<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
				<div>
					<label for="userId">User</label>
					<select id="userId" th:field="*{userId}" required="required">
						<option value="">— Select user —</option>
						<option th:each="u : ${users}" th:value="${u.userId}"
								th:text="${u.userName + ' (' + u.userEmail + ')'}"></option>
					</select>
					<p class="field-error" th:if="${#fields.hasErrors('userId')}" th:errors="*{userId}"></p>
				</div>
				<div>
					<label for="roleId">Role</label>
					<select id="roleId" th:field="*{roleId}" required="required">
						<option value="">— Select role —</option>
						<option th:each="r : ${roles}" th:value="${r.roleId}" th:text="${r.roleTitle}"></option>
					</select>
					<p class="field-error" th:if="${#fields.hasErrors('roleId')}" th:errors="*{roleId}"></p>
				</div>
				<div>
					<button type="submit" class="btn btn-primary">Assign</button>
					<a class="btn btn-secondary" th:href="@{/users}">Cancel</a>
				</div>
			</form>
		</div>
	</main>
</body>
</html>
