<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8"/>
	<meta name="viewport" content="width=device-width, initial-scale=1"/>
	<title>Hospitals</title>
	<link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
	<div th:replace="~{fragments :: navbar}"></div>
	<main>
		<div class="alert alert-error" th:if="${errorMessage}" th:text="${errorMessage}"></div>
		<div class="page-header">
			<h1>Hospitals</h1>
			<a class="btn btn-primary" th:href="@{/hospitals/new}">Add hospital</a>
		</div>
		<div class="card">
			<table class="data-table">
				<thead>
					<tr>
						<th>Name</th>
						<th>Type</th>
						<th>Place</th>
						<th>Doctor id</th>
						<th></th>
					</tr>
				</thead>
				<tbody>
					<tr th:each="h : ${hospitals}">
						<td th:text="${h.hospitalName}"></td>
						<td th:text="${h.hospitalType}"></td>
						<td th:text="${h.hospitalPlace}"></td>
						<td class="muted" th:text="${h.hospitalDoctorId}"></td>
						<td class="actions">
							<a class="btn btn-secondary btn-sm" th:href="@{/hospitals/{id}/edit(id=${h.hospitalId})}">Edit</a>
							<form th:action="@{/hospitals/{id}/delete(id=${h.hospitalId})}" method="post" style="display:inline;">
								<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
								<button type="submit" class="btn btn-danger btn-sm" onclick="return confirm('Delete?');">Delete</button>
							</form>
						</td>
					</tr>
				</tbody>
			</table>
		</div>
	</main>
</body>
</html>
