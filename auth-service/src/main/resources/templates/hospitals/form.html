<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8"/>
	<meta name="viewport" content="width=device-width, initial-scale=1"/>
	<title th:text="${editMode == true} ? 'Edit hospital' : 'New hospital'">Hospital</title>
	<link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
	<div th:replace="~{fragments :: navbar}"></div>
	<main>
		<div class="card">
			<h1 th:text="${editMode == true} ? 'Edit hospital' : 'New hospital'">Hospital</h1>
			<form th:object="${hospitalRequest}"
				  th:action="${editMode == true} ? @{/hospitals/{id}(id=${hospitalId})} : @{/hospitals}"
				  method="post"
				  class="form-grid">
				<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
				<div>
					<label for="hospitalName">Name</label>
					<input id="hospitalName" type="text" th:field="*{hospitalName}" required="required"/>
					<p class="field-error" th:if="${#fields.hasErrors('hospitalName')}" th:errors="*{hospitalName}"></p>
				</div>
				<div>
					<label for="hospitalType">Type</label>
					<input id="hospitalType" type="text" th:field="*{hospitalType}" required="required"/>
					<p class="field-error" th:if="${#fields.hasErrors('hospitalType')}" th:errors="*{hospitalType}"></p>
				</div>
				<div>
					<label for="hospitalDescription">Description</label>
					<textarea id="hospitalDescription" th:field="*{hospitalDescription}" rows="2"></textarea>
				</div>
				<div>
					<label for="hospitalPlace">Place</label>
					<input id="hospitalPlace" type="text" th:field="*{hospitalPlace}"/>
				</div>
				<div>
					<label for="hospitalAddress">Address</label>
					<textarea id="hospitalAddress" th:field="*{hospitalAddress}" rows="2"></textarea>
				</div>
				<div>
					<label for="hospitalDoctorId">Linked doctor</label>
					<select id="hospitalDoctorId" th:field="*{hospitalDoctorId}">
						<option value="">— None —</option>
						<option th:each="d : ${doctorOptions}" th:value="${d.doctorsId}" th:text="${d.doctorsName + ' (' + d.doctorsId + ')'}"></option>
					</select>
				</div>
				<div>
					<button type="submit" class="btn btn-primary">Save</button>
					<a class="btn btn-secondary" th:href="@{/hospitals}">Cancel</a>
				</div>
			</form>
		</div>
	</main>
</body>
</html>
