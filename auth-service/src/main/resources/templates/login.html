<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
	<meta charset="UTF-8"/>
	<meta name="viewport" content="width=device-width, initial-scale=1"/>
	<title>Sign in — HMS Auth</title>
	<link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
	<div class="auth-layout">
		<div class="auth-card card">
			<h1>Hospital Management — Auth</h1>
			<p class="muted">Sign in with your email and password.</p>

			<div class="alert alert-success" th:if="${param.logout}" th:text="'You have been signed out.'"></div>
			<div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
			<div class="alert alert-error" th:if="${param.error}" th:text="'Invalid email or password.'"></div>

			<form th:action="@{/login}" method="post" class="form-grid" style="margin-top:1rem;">
				<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
				<div>
					<label for="username">Email</label>
					<input id="username" type="email" name="username" autocomplete="username" required="required"/>
				</div>
				<div>
					<label for="password">Password</label>
					<input id="password" type="password" name="password" autocomplete="current-password" required="required"/>
				</div>
				<div>
					<button type="submit" class="btn btn-primary">Sign in</button>
					<a th:href="@{/register}" class="muted" style="margin-left:0.75rem;">Create an account</a>
				</div>
			</form>
		</div>
	</div>
</body>
</html>
