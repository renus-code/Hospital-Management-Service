<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8"/>
	<meta name="viewport" content="width=device-width, initial-scale=1"/>
	<title th:text="${editMode == true} ? 'Edit appointment' : 'New appointment'">Appointment</title>
	<link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
	<div th:replace="~{fragments :: navbar}"></div>
	<main>
		<div class="card">
			<h1 th:text="${editMode == true} ? 'Edit appointment' : 'New appointment'">Appointment</h1>
			<form th:object="${appointmentRequest}"
				  th:action="${editMode == true} ? @{/appointments/{id}(id=${appointmentId})} : @{/appointments}"
				  method="post"
				  class="form-grid">
				<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
				<div>
					<label for="appointmentNumber">Number</label>
					<input id="appointmentNumber" type="text" th:field="*{appointmentNumber}" required="required"/>
					<p class="field-error" th:if="${#fields.hasErrors('appointmentNumber')}" th:errors="*{appointmentNumber}"></p>
				</div>
				<div>
					<label for="appointmentType">Type</label>
					<input id="appointmentType" type="text" th:field="*{appointmentType}" required="required"/>
					<p class="field-error" th:if="${#fields.hasErrors('appointmentType')}" th:errors="*{appointmentType}"></p>
				</div>
				<div>
					<label for="appointmentDate">Date</label>
					<input id="appointmentDate" type="date" th:field="*{appointmentDate}" required="required"/>
					<p class="field-error" th:if="${#fields.hasErrors('appointmentDate')}" th:errors="*{appointmentDate}"></p>
				</div>
				<div>
					<label for="appointmentDoctorId">Linked doctor</label>
					<select id="appointmentDoctorId" th:field="*{appointmentDoctorId}">
						<option value="">-- None --</option>
						<option th:each="d : ${doctorOptions}" th:value="${d.doctorsId}" th:text="${d.doctorsName + ' (' + d.doctorsId + ')'}"></option>
					</select>
				</div>
				<div>
					<label for="appointmentDescription">Description</label>
					<textarea id="appointmentDescription" th:field="*{appointmentDescription}" rows="3"></textarea>
				</div>
				<div>
					<button type="submit" class="btn btn-primary">Save</button>
					<a class="btn btn-secondary" th:href="@{/appointments}">Cancel</a>
				</div>
			</form>
		</div>
	</main>
</body>
</html>
