<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8"/>
	<meta name="viewport" content="width=device-width, initial-scale=1"/>
	<title>Appointments</title>
	<link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
	<div th:replace="~{fragments :: navbar}"></div>
	<main>
		<div class="alert alert-error" th:if="${errorMessage}" th:text="${errorMessage}"></div>
		<div class="page-header">
			<h1>Appointments</h1>
			<a class="btn btn-primary" th:href="@{/appointments/new}">Add appointment</a>
		</div>
		<div class="card">
			<table class="data-table">
				<thead>
					<tr>
						<th>Number</th>
						<th>Type</th>
						<th>Date</th>
						<th>Doctor id</th>
						<th></th>
					</tr>
				</thead>
				<tbody>
					<tr th:each="a : ${appointments}">
						<td th:text="${a.appointmentNumber}"></td>
						<td th:text="${a.appointmentType}"></td>
						<td th:text="${a.appointmentDate}"></td>
						<td class="muted" th:text="${a.appointmentDoctorId}"></td>
						<td class="actions">
							<a class="btn btn-secondary btn-sm" th:href="@{/appointments/{id}/edit(id=${a.appointmentId})}">Edit</a>
							<form th:action="@{/appointments/{id}/delete(id=${a.appointmentId})}" method="post" style="display:inline;">
								<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
								<button type="submit" class="btn btn-danger btn-sm" onclick="return confirm('Delete appointment?');">Delete</button>
							</form>
						</td>
					</tr>
				</tbody>
			</table>
		</div>
	</main>
</body>
</html>
