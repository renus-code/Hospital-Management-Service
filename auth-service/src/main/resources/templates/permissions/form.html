<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8"/>
	<meta name="viewport" content="width=device-width, initial-scale=1"/>
	<title th:text="${editMode == true} ? 'Edit permission' : 'New permission'">Permission — HMS Auth</title>
	<link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
	<div th:replace="~{fragments :: navbar}"></div>
	<main>
		<div class="card" style="max-width:560px;">
			<h1 th:text="${editMode == true} ? 'Edit permission' : 'New permission'">Permission</h1>
			<form th:object="${permissionRequest}"
				  th:action="${editMode == true} ? @{/permissions/{id}(id=${permissionId})} : @{/permissions}"
				  method="post"
				  class="form-grid">
				<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
				<div>
					<label for="permissionRoleId">Role</label>
					<select id="permissionRoleId" th:field="*{permissionRoleId}" required="required">
						<option value="">— Select role —</option>
						<option th:each="r : ${roles}" th:value="${r.roleId}" th:text="${r.roleTitle}"></option>
					</select>
					<p class="field-error" th:if="${#fields.hasErrors('permissionRoleId')}" th:errors="*{permissionRoleId}"></p>
				</div>
				<div>
					<label for="permissionTitle">Title</label>
					<input id="permissionTitle" type="text" th:field="*{permissionTitle}" required="required"/>
					<p class="field-error" th:if="${#fields.hasErrors('permissionTitle')}" th:errors="*{permissionTitle}"></p>
				</div>
				<div>
					<label for="permissionModule">Module</label>
					<input id="permissionModule" type="text" th:field="*{permissionModule}" required="required"/>
					<p class="field-error" th:if="${#fields.hasErrors('permissionModule')}" th:errors="*{permissionModule}"></p>
				</div>
				<div>
					<label for="permissionDescription">Description</label>
					<textarea id="permissionDescription" th:field="*{permissionDescription}" rows="3"></textarea>
				</div>
				<div>
					<button type="submit" class="btn btn-primary">Save</button>
					<a class="btn btn-secondary" th:href="@{/permissions}">Cancel</a>
				</div>
			</form>
		</div>
	</main>
</body>
</html>
