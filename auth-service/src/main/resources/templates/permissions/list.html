<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8"/>
	<meta name="viewport" content="width=device-width, initial-scale=1"/>
	<title>Permissions — HMS Auth</title>
	<link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
	<div th:replace="~{fragments :: navbar}"></div>
	<main>
		<div class="page-header">
			<h1>Permissions</h1>
			<a class="btn btn-primary" th:href="@{/permissions/new}">Add permission</a>
		</div>
		<div class="card">
			<table class="data-table">
				<thead>
					<tr>
						<th>Title</th>
						<th>Module</th>
						<th>Role id</th>
						<th></th>
					</tr>
				</thead>
				<tbody>
					<tr th:each="p : ${permissions}">
						<td th:text="${p.permissionTitle}"></td>
						<td th:text="${p.permissionModule}"></td>
						<td class="muted" th:text="${p.permissionRoleId}"></td>
						<td class="actions">
							<a class="btn btn-secondary btn-sm" th:href="@{/permissions/{id}/edit(id=${p.permissionId})}">Edit</a>
							<form th:action="@{/permissions/{id}/delete(id=${p.permissionId})}" method="post" style="display:inline;">
								<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
								<button type="submit" class="btn btn-danger btn-sm" onclick="return confirm('Delete?');">Delete</button>
							</form>
						</td>
					</tr>
				</tbody>
			</table>
		</div>
	</main>
</body>
</html>
