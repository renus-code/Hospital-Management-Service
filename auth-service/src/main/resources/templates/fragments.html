<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
	<nav th:fragment="navbar" class="navbar">
		<a class="navbar-brand" th:href="@{/dashboard}">HMS</a>

		<div class="nav-links" sec:authorize="hasRole('ADMIN')">
			<a th:href="@{/hospitals}">Hospitals</a>
			<a th:href="@{/doctors}">Doctors</a>
			<a th:href="@{/patients}">Patients</a>
			<a th:href="@{/appointments}">Appointments</a>
			<a th:href="@{/medicines}">Medicines</a>
			<a th:href="@{/roles}">Roles</a>
			<a th:href="@{/users}">Users</a>
			<a th:href="@{/permissions}">Permissions</a>
			<a th:href="@{/roles/assign-role}">Assign role</a>
			<form th:action="@{/logout}" method="post" style="display:inline;">
				<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
				<button type="submit" class="btn btn-secondary btn-sm">Logout</button>
			</form>
		</div>

		<div class="nav-links" sec:authorize="hasRole('DOCTOR')">
			<a th:href="@{/patients}">Patients</a>
			<a th:href="@{/appointments}">Appointments</a>
			<a th:href="@{/medicines}">Medicines</a>
			<form th:action="@{/logout}" method="post" style="display:inline;">
				<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
				<button type="submit" class="btn btn-secondary btn-sm">Logout</button>
			</form>
		</div>

		<div class="nav-links" sec:authorize="hasRole('PATIENT')">
			<a th:href="@{/doctors}">Doctors</a>
			<a th:href="@{/appointments}">Appointments</a>
			<a th:href="@{/medicines}">Medicines</a>
			<form th:action="@{/logout}" method="post" style="display:inline;">
				<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
				<button type="submit" class="btn btn-secondary btn-sm">Logout</button>
			</form>
		</div>

		<div class="nav-links" sec:authorize="!isAuthenticated()">
			<a th:href="@{/login}">Sign in</a>
			<a th:href="@{/register}">Register</a>
		</div>
	</nav>
</body>
</html>
