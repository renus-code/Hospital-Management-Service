<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8"/>
	<meta name="viewport" content="width=device-width, initial-scale=1"/>
	<title>Users — HMS Auth</title>
	<link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
	<div th:replace="~{fragments :: navbar}"></div>
	<main>
		<div class="page-header">
			<h1>Users</h1>
			<a class="btn btn-primary" th:href="@{/users/new}">Add user</a>
		</div>
		<div class="card">
			<table class="data-table">
				<thead>
					<tr>
						<th>Name</th>
						<th>Email</th>
						<th>Role id</th>
						<th></th>
					</tr>
				</thead>
				<tbody>
					<tr th:each="u : ${users}">
						<td th:text="${u.userName}"></td>
						<td th:text="${u.userEmail}"></td>
						<td class="muted" th:text="${u.userRoleId}"></td>
						<td class="actions">
							<a class="btn btn-secondary btn-sm" th:href="@{/users/{id}/edit(id=${u.userId})}">Edit</a>
							<form th:action="@{/users/{id}/delete(id=${u.userId})}" method="post" style="display:inline;">
								<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
								<button type="submit" class="btn btn-danger btn-sm" onclick="return confirm('Delete this user?');">Delete</button>
							</form>
						</td>
					</tr>
				</tbody>
			</table>
		</div>
	</main>
</body>
</html>
