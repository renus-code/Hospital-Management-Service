<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8"/>
	<meta name="viewport" content="width=device-width, initial-scale=1"/>
	<title th:text="${editMode == true} ? 'Edit medicine' : 'New medicine'">Medicine</title>
	<link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
	<div th:replace="~{fragments :: navbar}"></div>
	<main>
		<div class="card">
			<h1 th:text="${editMode == true} ? 'Edit medicine' : 'New medicine'">Medicine</h1>
			<form th:object="${medicineRequest}"
				  th:action="${editMode == true} ? @{/medicines/{id}(id=${medicinesId})} : @{/medicines}"
				  method="post"
				  class="form-grid">
				<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
				<div>
					<label for="medicinesName">Name</label>
					<input id="medicinesName" type="text" th:field="*{medicinesName}" required="required"/>
					<p class="field-error" th:if="${#fields.hasErrors('medicinesName')}" th:errors="*{medicinesName}"></p>
				</div>
				<div>
					<label for="medicinesCompany">Company</label>
					<input id="medicinesCompany" type="text" th:field="*{medicinesCompany}"/>
				</div>
				<div>
					<label for="medicinesCost">Cost</label>
					<input id="medicinesCost" type="text" th:field="*{medicinesCost}"/>
				</div>
				<div>
					<label for="medicinesType">Type</label>
					<input id="medicinesType" type="text" th:field="*{medicinesType}"/>
				</div>
				<div>
					<label for="medicinesDescription">Description</label>
					<textarea id="medicinesDescription" th:field="*{medicinesDescription}" rows="3"></textarea>
				</div>
				<div>
					<button type="submit" class="btn btn-primary">Save</button>
					<a class="btn btn-secondary" th:href="@{/medicines}">Cancel</a>
				</div>
			</form>
		</div>
	</main>
</body>
</html>
