<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
	<meta charset="UTF-8"/>
	<meta name="viewport" content="width=device-width, initial-scale=1"/>
	<title>Medicines</title>
	<link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
	<div th:replace="~{fragments :: navbar}"></div>
	<main>
		<div class="alert alert-error" th:if="${errorMessage}" th:text="${errorMessage}"></div>
		<div class="page-header">
			<h1>Medicines</h1>
			<a sec:authorize="hasRole('ADMIN')" class="btn btn-primary" th:href="@{/medicines/new}">Add medicine</a>
		</div>
		<div class="card">
			<table class="data-table">
				<thead>
					<tr>
						<th>Name</th>
						<th>Company</th>
						<th>Cost</th>
						<th>Type</th>
						<th></th>
					</tr>
				</thead>
				<tbody>
					<tr th:each="m : ${medicines}">
						<td th:text="${m.medicinesName}"></td>
						<td th:text="${m.medicinesCompany}"></td>
						<td th:text="${m.medicinesCost}"></td>
						<td th:text="${m.medicinesType}"></td>
						<td class="actions" sec:authorize="hasRole('ADMIN')">
							<a class="btn btn-secondary btn-sm" th:href="@{/medicines/{id}/edit(id=${m.medicinesId})}">Edit</a>
							<form th:action="@{/medicines/{id}/delete(id=${m.medicinesId})}" method="post" style="display:inline;">
								<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
								<button type="submit" class="btn btn-danger btn-sm" onclick="return confirm('Delete medicine?');">Delete</button>
							</form>
						</td>
						<td class="actions muted" sec:authorize="!hasRole('ADMIN')">&mdash;</td>
					</tr>
				</tbody>
			</table>
		</div>
	</main>
</body>
</html>
