<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
	<meta charset="UTF-8"/>
	<meta name="viewport" content="width=device-width, initial-scale=1"/>
	<title>Dashboard — HMS</title>
	<link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
	<div th:replace="~{fragments :: navbar}"></div>
	<main>
		<div class="card">
			<h1>Dashboard</h1>
			<p>Signed in as <strong th:text="${username}">user</strong>
				(<span sec:authorize="hasRole('ADMIN')">Admin</span>
				<span sec:authorize="hasRole('DOCTOR')">Doctor</span>
				<span sec:authorize="hasRole('PATIENT')">Patient</span>)
			</p>
			<p class="muted">
				Hospital backend (REST on port 8082):
				<strong th:text="${hospitalIntegrationOk} ? 'reachable' : 'unreachable'">reachable</strong>.
				Patient backend (REST on port 8083):
				<strong th:text="${patientIntegrationOk} ? 'reachable' : 'unreachable'">reachable</strong>.
			</p>

			<div sec:authorize="hasRole('ADMIN')" style="margin-top:1rem;display:flex;flex-wrap:wrap;gap:0.5rem;">
				<a class="btn btn-primary" th:href="@{/hospitals}">Hospitals</a>
				<a class="btn btn-primary" th:href="@{/doctors}">Doctors</a>
				<a class="btn btn-primary" th:href="@{/patients}">Patients</a>
				<a class="btn btn-primary" th:href="@{/appointments}">Appointments</a>
				<a class="btn btn-primary" th:href="@{/medicines}">Medicines</a>
				<a class="btn btn-secondary" th:href="@{/roles}">Roles</a>
				<a class="btn btn-secondary" th:href="@{/users}">Users</a>
				<a class="btn btn-secondary" th:href="@{/permissions}">Permissions</a>
			</div>

			<div sec:authorize="hasRole('DOCTOR')" style="margin-top:1rem;display:flex;flex-wrap:wrap;gap:0.5rem;">
				<a class="btn btn-primary" th:href="@{/patients}">My Patients</a>
				<a class="btn btn-primary" th:href="@{/appointments}">Appointments</a>
				<a class="btn btn-primary" th:href="@{/medicines}">Medicines</a>
			</div>

			<div sec:authorize="hasRole('PATIENT')" style="margin-top:1rem;display:flex;flex-wrap:wrap;gap:0.5rem;">
				<a class="btn btn-primary" th:href="@{/doctors}">Doctors</a>
				<a class="btn btn-primary" th:href="@{/appointments}">My Appointments</a>
				<a class="btn btn-primary" th:href="@{/medicines}">Medicines</a>
			</div>
		</div>
	</main>
</body>
</html>
