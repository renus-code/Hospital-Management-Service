server.port=8081
spring.application.name=auth-service

spring.data.mongodb.uri=mongodb://localhost:27017/hms-auth

# Run without a local Eureka server during development
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false

# HS256: at least 32 bytes; override in production via JWT_SECRET
jwt.secret=${JWT_SECRET:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
jwt.expiration-ms=86400000
