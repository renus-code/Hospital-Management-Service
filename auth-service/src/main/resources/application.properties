server.port=8081
spring.application.name=auth-service

spring.thymeleaf.cache=false

spring.mongodb.uri=mongodb://localhost:27017/hms-auth

# Eureka client: register with the standalone discovery server on :8761
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=${EUREKA_URI:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true
eureka.instance.hostname=Renuupendra
eureka.instance.instance-id=Renuupendra:${spring.application.name}:${server.port}

# HS256: at least 32 bytes;
jwt.secret=${JWT_SECRET:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
jwt.expiration-ms=86400000

# hospital-service REST (unified UI proxies here with session JWT)
services.hospital.base-url=http://localhost:8082

# patient-service REST (unified UI proxies here with session JWT)
services.patient.base-url=http://localhost:8083

logging.level.root=INFO
logging.level.com.hospital.auth=INFO

# App-first flow: opening auth-service automatically in browser on startup
app.ui.auto-open=true
app.ui.url=http://localhost:8081/login

# Single custom AuthenticationProvider (UnifiedFormLoginAuthenticationProvider); avoid default in-memory user
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
